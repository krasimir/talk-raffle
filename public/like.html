<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presentation Likes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="min-h-screen p-4">
    <main class="max-w-md mx-auto mt-6 border rounded shadow-sm p-6" data-page="like">
      <h1 class="text-2xl font-semibold text-center">Tap when you like something</h1>
      <p class="mt-2 text-slate-600 text-center">You can tap as many times as you want during the talk.</p>
      <p class="mt-3 text-center font-semibold" id="participant-name"></p>

      <button id="like-button" class="heart-button mt-6" type="button" aria-label="Like this moment">
        ❤️
      </button>

      <p id="like-message" class="mt-4 text-sm text-center"></p>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
