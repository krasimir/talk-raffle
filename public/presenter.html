<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presenter</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="min-h-screen p-4">
    <main class="max-w-4xl mx-auto space-y-4" data-page="presenter">
      <section class="border rounded shadow-sm p-6" id="auth-panel">
        <h1 class="text-2xl font-semibold">Presenter Controls</h1>
        <p class="mt-2 text-slate-600">Enter PIN to unlock presenter actions.</p>
        <form id="auth-form" class="mt-4 flex gap-2 items-center">
          <input class="input" id="pin" name="pin" type="password" placeholder="PIN" required />
          <button class="btn" type="submit">Unlock</button>
        </form>
        <p id="auth-message" class="mt-3 text-sm"></p>
      </section>

      <section class="border rounded shadow-sm p-6 hidden" id="controls-panel">
        <div class="flex justify-between items-center gap-2">
          <h2 class="text-lg font-semibold">Raffle</h2>
          <span class="pill" id="participants-count">0 participants</span>
        </div>

        <div class="mt-4 flex gap-2 flex-wrap">
          <button class="btn" id="start-button" type="button">Start presentation</button>
          <button class="btn" id="refresh-button" type="button">Refresh list</button>
          <button class="btn" id="reset-button" type="button">Reset raffle</button>
          <button class="btn" id="logout-button" type="button">Lock</button>
        </div>

        <p id="presenter-message" class="mt-3 text-sm"></p>
        <p id="presentation-start" class="mt-2 text-sm text-slate-600">Presentation start: not started</p>
        <div id="winner-box" class="mt-4 p-4 rounded bg-slate-100 hidden"></div>

        <h3 class="mt-6 text-lg font-semibold">Participants</h3>
        <div id="participants-list" class="mt-3 flex flex-wrap gap-2"></div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
