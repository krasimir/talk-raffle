<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draw Screen</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="min-h-screen p-4">
    <main class="max-w-4xl mx-auto space-y-4" data-page="draw">
      <section class="border rounded shadow-sm p-6" id="controls-panel">
        <div class="flex justify-between items-center gap-2">
          <h2 class="text-lg font-semibold">Live Draw</h2>
          <span class="pill" id="participants-count">0 remaining / 0 total</span>
        </div>

        <div class="mt-4 flex gap-2 flex-wrap">
          <button class="btn" id="refresh-button" type="button">Refresh list</button>
          <button class="btn" id="draw-button" type="button">Mix and pick next winner</button>
        </div>

        <p id="presenter-message" class="mt-3 text-sm"></p>
        <div id="winner-box" class="mt-4 p-4 rounded bg-slate-100 hidden"></div>

        <h3 class="mt-6 text-lg font-semibold">Participants</h3>
        <div id="participants-list" class="mt-3 flex flex-wrap gap-2"></div>

        <h3 class="mt-6 text-lg font-semibold">Picked winners (this session)</h3>
        <div id="winner-history" class="mt-3 flex flex-wrap gap-2"></div>

        <h3 class="mt-6 text-lg font-semibold">Likes over time</h3>
        <p id="likes-summary" class="mt-2 text-sm text-slate-600"></p>
        <div id="likes-chart" class="mt-3 chart"></div>

        <h3 class="mt-6 text-lg font-semibold">Most active attendees</h3>
        <div id="likes-leaderboard" class="mt-3 leaderboard"></div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
